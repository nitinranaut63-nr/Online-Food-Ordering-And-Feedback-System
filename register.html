<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | FoodZone</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #ff6b6b);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.register-box {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
}

.title {
    text-align: center;
    color: white;
    font-weight: 600;
    font-size: 26px;
    margin-bottom: 20px;
}

label {
    color: #fff;
    font-size: 13px;
}

.form-control {
    border-radius: 10px;
    border: none;
    padding: 10px;
}

.form-control:focus {
    box-shadow: none;
    border: 2px solid #ff6b6b;
}

.btn-register {
    background: #ff6b6b;
    color: white;
    font-weight: 500;
    border-radius: 10px;
    padding: 10px;
    transition: 0.3s;
}

.btn-register:hover {
    background: #ff4757;
    transform: scale(1.03);
}

.msg {
    color: #fff;
    text-align: center;
    font-size: 14px;
    margin-bottom: 10px;
}

a {
    color: #ffd6d6;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* Password toggle */
.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 12px;
    top: 38px;
    cursor: pointer;
    color: #555;
}
</style>
</head>

<body>

<div class="register-box">

    <div class="title">Create Account </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
        </div>

        <div class="mb-3 password-box">
            <label>Password</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Create password" required>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <button type="submit" class="btn btn-register w-100">Register</button>

        <p class="text-center mt-3">
            Already have an account? <a href="/login">Login</a>
        </p>

    </form>

</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = (pass.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
