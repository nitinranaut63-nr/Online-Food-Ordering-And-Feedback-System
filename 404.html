{% extends 'base.html' %}

{% block content %}

<style>

.error-container{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.error-box{
    background:#111827;
    padding:60px;
    border-radius:25px;
    width:100%;
    max-width:600px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.error-code{
    font-size:120px;
    font-weight:800;
    color:#f59e0b;
}

.error-text{
    color:#94a3b8;
    margin-top:15px;
}

.home-btn{
    margin-top:25px;
    padding:12px 30px;
    border-radius:12px;
    background:#f59e0b;
    color:white;
    text-decoration:none;
    font-weight:600;
}

.home-btn:hover{
    background:#ea580c;
}

</style>

<div class="container error-container">

    <div class="error-box">

        <div class="error-code">
            404
        </div>

        <h2>Page Not Found</h2>

        <p class="error-text">
            The page you are looking for does not exist.
        </p>

        <a href="/" class="home-btn">
            Back To Home
        </a>

    </div>

</div>

{% endblock %}
