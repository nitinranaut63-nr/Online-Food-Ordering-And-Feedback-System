<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Give Feedback</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome (for stars) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .feedback-container {
            max-width: 600px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .feedback-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .star-rating i {
            font-size: 28px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
        }

        .star-rating i.active {
            color: #ffc107;
        }

        textarea {
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="feedback-container">

        <h3 class="feedback-title">⭐ Give Your Feedback</h3>

        <form method="POST">

            <!-- Star Rating -->
            <div class="mb-4 text-center">
                <label class="form-label d-block mb-2">Rate your experience:</label>
                <div class="star-rating">
                    <i class="fa fa-star" data-value="1"></i>
                    <i class="fa fa-star" data-value="2"></i>
                    <i class="fa fa-star" data-value="3"></i>
                    <i class="fa fa-star" data-value="4"></i>
                    <i class="fa fa-star" data-value="5"></i>
                </div>
                <input type="hidden" name="rating" id="rating" required>
            </div>

            <!-- Comment -->
            <div class="mb-3">
                <label class="form-label">Your Review</label>
                <textarea name="comment" class="form-control" rows="4" placeholder="Write your feedback here..." required></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-4">
                <a href="/menu" class="btn btn-outline-secondary">⬅ Back</a>
                <button type="submit" class="btn btn-success">Submit Feedback </button>
            </div>

        </form>

    </div>
</div>

<!-- JS for Star Rating -->
<script>
    const stars = document.querySelectorAll(".star-rating i");
    const ratingInput = document.getElementById("rating");

    stars.forEach(star => {
        star.addEventListener("click", function () {
            let value = this.getAttribute("data-value");
            ratingInput.value = value;

            stars.forEach(s => s.classList.remove("active"));
            for (let i = 0; i < value; i++) {
                stars[i].classList.add("active");
            }
        });
    });
</script>

</body>
</html>
