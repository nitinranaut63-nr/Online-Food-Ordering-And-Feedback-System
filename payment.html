{% extends 'base.html' %}

{% block content %}

<style>

body{
    background:#0b1120;
    color:white;
}

.payment-wrapper{
    max-width:900px;
    margin:auto;
}

.payment-card{
    background:linear-gradient(145deg,#111827,#1e293b);
    border-radius:30px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.05);
}

.page-title{
    font-size:38px;
    font-weight:700;
}

.amount-box{
    background:#0f172a;
    padding:25px;
    border-radius:20px;
    text-align:center;
    margin-bottom:30px;
}

.amount-box h2{
    color:#22c55e;
    font-size:40px;
    font-weight:700;
}

.form-control,
.form-select{
    background:#1e293b !important;
    border:none !important;
    color:white !important;
    height:55px;
    border-radius:14px;
}

.form-control::placeholder{
    color:#94a3b8;
}

.payment-method{
    background:#1e293b;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
}

.secure-box{
    background:#052e16;
    color:#86efac;
    padding:15px;
    border-radius:14px;
    text-align:center;
    margin-top:20px;
}

.pay-btn{
    height:60px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#f59e0b,#f97316);
    font-size:20px;
    font-weight:700;
    transition:.3s;
}

.pay-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(249,115,22,0.4);
}

.order-summary{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    margin-bottom:25px;
}

</style>

<div class="container py-5">

    <div class="payment-wrapper">

        <div class="payment-card">

            <h1 class="page-title text-center mb-4">
                💳 Secure Checkout
            </h1>

            <div class="amount-box">
                <p class="mb-2">Total Payable Amount</p>
                <h2>₹{{ total }}</h2>
            </div>

            <div class="order-summary">

                <h5>📦 Order Summary</h5>

                <hr>

                <div class="d-flex justify-content-between">
                    <span>Food Total</span>
                    <span>₹{{ total }}</span>
                </div>

                <div class="d-flex justify-content-between mt-2">
                    <span>Delivery Charge</span>
                    <span class="text-success">FREE</span>
                </div>

                <hr>

                <div class="d-flex justify-content-between fw-bold">
                    <span>Total</span>
                    <span class="text-warning">₹{{ total }}</span>
                </div>

            </div>

            <form method="POST">

                <label class="mb-2">
                    Payment Method
                </label>

                <select name="payment_method"
                        class="form-select mb-4">

                    <option value="UPI">
                        📱 UPI Payment
                    </option>

                    <option value="Card">
                        💳 Debit / Credit Card
                    </option>

                    <option value="COD">
                        💵 Cash On Delivery
                    </option>

                </select>

                <label class="mb-2">
                    UPI ID / Card Number
                </label>

                <input type="text"
                       name="payment_info"
                       class="form-control mb-4"
                       placeholder="Enter payment details">

                <button type="submit"
                        class="btn w-100 pay-btn">

                     Pay ₹{{ total }}

                </button>

            </form>

            <div class="secure-box">
                100% Secure Payment • SSL Protected
            </div>

        </div>

    </div>

</div>

{% endblock %}
